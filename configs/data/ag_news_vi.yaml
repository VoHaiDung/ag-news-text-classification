# Vietnamese AG News configuration.
# Used after Phase 5 generates the translated dataset under
# ``data/processed/ag_news_vi``.

name: ag_news_vi
description: Vietnamese AG News, machine-translated from the English original.

data:
  name: ag_news_vi
  hf_path: data/processed/ag_news_vi  # local datasets folder produced by Phase 5
  text_column: text_vi
  label_column: label
  num_labels: 4
  label_names: [Thế giới, Thể thao, Kinh doanh, Khoa học - Công nghệ]
  train_split: train
  test_split: test
  validation_size: 0.1
  max_length: 256
  language: vi
