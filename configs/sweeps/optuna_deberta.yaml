# Optuna search space for Phase 4 hyper-parameter tuning of DeBERTa-v3.
# Consumed by ``src.training.sweeps.run_optuna_search``.

study_name: deberta_v3_small_optuna
direction: maximize
metric: eval_f1_macro
n_trials: 20
timeout_seconds: 14400
pruner: median

base_config: configs/models/deberta_v3_small.yaml

search_space:
  training.learning_rate:
    type: loguniform
    low: 5.0e-6
    high: 1.0e-4
  training.batch_size:
    type: categorical
    choices: [16, 32, 64]
  training.weight_decay:
    type: uniform
    low: 0.0
    high: 0.3
  training.warmup_ratio:
    type: uniform
    low: 0.0
    high: 0.2
  training.epochs:
    type: int
    low: 2
    high: 5
