# DeBERTa-v3-small fine-tuning configuration.

name: deberta_v3_small
description: Microsoft DeBERTa-v3-small fine-tuned on AG News.

model:
  name: microsoft/deberta-v3-small
  family: deberta-v3
  tokenizer_name: null
  max_length: 256
  dropout: 0.1
  pooling: cls

training:
  seed: 42
  epochs: 3
  batch_size: 32
  eval_batch_size: 64
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  fp16: true
  bf16: false
  optimizer: adamw_torch
  scheduler: linear
  early_stopping_patience: 2
  save_total_limit: 2
  logging_steps: 50
