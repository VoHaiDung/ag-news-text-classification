# ModernBERT-large seed 42 + R-Drop (Liang et al., 2021).
# Doubles as the single-seed R-Drop cell of the 2x2 ablation grid AND one
# of the three seeds in the R-Drop ensemble cell.

name: modernbert_large_seed42_rdrop
description: ModernBERT-large + R-Drop regularisation, seed=42.

model:
  name: answerdotai/ModernBERT-large
  family: modernbert
  tokenizer_name: null
  max_length: 256
  dropout: 0.1
  pooling: cls

training:
  seed: 42
  epochs: 5
  batch_size: 8
  eval_batch_size: 16
  learning_rate: 8.0e-6
  weight_decay: 0.01
  warmup_ratio: 0.1
  gradient_accumulation_steps: 2
  fp16: false
  bf16: true
  optimizer: adamw_torch
  scheduler: cosine
  early_stopping_patience: 2
  save_total_limit: 2
  logging_steps: 50
  label_smoothing_factor: 0.1
  r_drop_alpha: 1.0
